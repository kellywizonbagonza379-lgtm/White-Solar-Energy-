<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produits - White Solar Energy</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}
header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}
button{
    background:#0b6e4f;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#09563d;
}
</style>

</head>
<body>

<header>
<h1>White Solar Energy</h1>
<p>Nos Produits Solaires</p>
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300x180?text=Panneau+Solaire" alt="Panneau solaire">
<h3>Panneau Solaire 550W</h3>
<p>Prix : 250 USD</p>
<button>Ajouter au panier</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x180?text=Batterie+Solaire" alt="Batterie">
<h3>Batterie Lithium</h3>
<p>Prix : 450 USD</p>
<button>Ajouter au panier</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x180?text=Onduleur" alt="Onduleur">
<h3>Onduleur Hybride</h3>
<p>Prix : 350 USD</p>
<button>Ajouter au panier</button>
</div>

</div>

</body>
</html>
