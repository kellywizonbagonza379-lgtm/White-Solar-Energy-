<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - White Solar Energy</title>


    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
            width:320px;
        }

        h2{
            text-align:center;
            color:#0b7a3d;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#0b7a3d;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#095d2f;
        }

        p{
            text-align:center;
        }

        a{
            color:#0b7a3d;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="login-box">

<h2>Connexion</h2>

<form id="loginForm">

<input
type="tel"
id="phone"
placeholder="Numéro de téléphone"
required>

<input
type="password"
id="password"
placeholder="Mot de passe"
required>

<button type="submit">
Se connecter
</button>

</form>

<p>
Pas encore de compte ?
<a href="register.html">Créer un compte</a>
</p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
