<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte - White Solar Energy</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
max-width:400px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#0A4DA2;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0A4DA2;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#083a7d;
}

p{
text-align:center;
}

a{
color:#0A4DA2;
text-decoration:none;
}
</style>

</head>

<body>
<nav style="background:#0b6e4f;padding:15px;text-align:center;">
  <a href="index.html" style="color:white;margin:10px;text-decoration:none;">Accueil</a>
  <a href="products.html" style="color:white;margin:10px;text-decoration:none;">Produits</a>
  <a href="cart.html" style="color:white;margin:10px;text-decoration:none;">Panier</a>
  <a href="register.html" style="color:white;margin:10px;text-decoration:none;">Créer un compte</a>
  <a href="login.html" style="color:white;margin:10px;text-decoration:none;">Connexion</a>
  <a href="dashboard.html" style="color:white;margin:10px;text-decoration:none;">Tableau de bord</a>
  <a href="checkout.html" style="color:white;margin:10px;text-decoration:none;">Paiement</a>
</nav>
<div class="container">

<h2>Créer un compte</h2>

<form>

<input type="text" placeholder="Nom complet" required>

<input type="tel" placeholder="Numéro de téléphone" required>

<input type="email" placeholder="Adresse e-mail (facultatif)">

<select required>
<option value="">Choisir votre pays</option>
<option>Ouganda</option>
<option>RDC</option>
<option>Kenya</option>
<option>Tanzanie</option>
<option>Rwanda</option>
<option>Burundi</option>
</select>

<input type="password" placeholder="Mot de passe" required>

<input type="password" placeholder="Confirmer le mot de passe" required>

<button type="submit">Créer un compte</button>

</form>

<p>Vous avez déjà un compte ? <a href="login.html">Se connecter</a></p>

</div>

</body>
</html>
