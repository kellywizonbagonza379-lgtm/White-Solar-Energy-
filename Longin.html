<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - White Solar Energy</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:white;
    padding:25px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#0b6e4f;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#0b6e4f;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#09563d;
}
</style>
</head>

<body>

<div class="container">
<h2>Connexion</h2>

<form id="loginForm">
<input type="email" id="email" placeholder="Adresse e-mail" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<button type="submit">Se connecter</button>
</form>

<p id="message"></p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

document.getElementById("message").innerHTML =
"<span style='color:green'>Connexion réussie !</span>";

// Remplace "dashboard.html" par la page d'accueil de ton site si nécessaire.
window.location.href = "dashboard.html";
});
</script>

</body>
</html>
